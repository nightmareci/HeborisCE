app-id: com.nightmareci.HeborisCE
runtime: org.freedesktop.Platform
runtime-version: '21.08'
sdk: org.freedesktop.Sdk
command: HeborisCE
rename-desktop-file: HeborisCE.desktop
rename-icon: HeborisCE
modules:
    - name: HeborisCE
      buildsystem: cmake-ninja
      builddir: true
      config-opts:
          - -DCMAKE_INSTALL_PREFIX=/app
          - -DPACKAGE_TYPE=Installable
      sources:
        - type: dir
          path: ../..
finish-args:
    - --device=all
    - --share=ipc
    - --socket=wayland
    - --socket=fallback-x11
    - --socket=pulseaudio
    - --device=dri
    - --filesystem=home
